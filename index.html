<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>YouTube Player</title>

    <style>
        /* BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #07070B;
            color: #fff;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }


        /* PLAYER */
        .player {
            width: min(95vw, 720px);
            aspect-ratio: 16 / 9;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, .65);
        }

        /* SEARCH */
        .search-form {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-input {
            width: 260px;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            background: #14141A;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        .search-btn {
            padding: 12px 22px;
            border: none;
            border-radius: 5px;
            background: linear-gradient(180deg, #f7f7f7, #cfcfcf);
            color: #111;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 0 #7a7a7a;
        }

        /* CONTROL AREA */
        .control-wrap {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .control-list {
            list-style: none;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            border-radius: 20px;
            background: #101015;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
            gap: 14px;
        }


        /* MIXER BUTTON */
        .mixer-btn {
            min-width: 140px;
            padding: 14px 18px;
            text-align: center;
            border-radius: 5px;
            background: linear-gradient(180deg, #f9f9f9, #cfcfcf);
            color: #111;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 0 #7a7a7a;
            user-select: none;
            transition: .15s;
        }

        .mixer-btn:hover {
            /* transform: translateY(-2px); */
        }

        .mixer-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #7a7a7a;
        }

        /* VOLUME */
        .volume-box {
            min-height: 220px;
            padding: 16px 12px;
            border-radius: 12px;
            background: #1B1B23;
            border: 1px solid #2b2b35;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .volume-range {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            width: 28px;
            height: 130px;
            cursor: pointer;
        }

        .volume-num {
            font-size: 15px;
        }

        /* SELECT */
        .movie-select {
            min-width: 220px;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            background: #1B1B23;
            color: #fff;
        }

        /* SPEED */
        .speed-box {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 14px;
            border-radius: 16px;
            background: #1B1B23;
            justify-content: center;
        }

        .speed-box label {
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- Player -->
    <div id="player" class="player"></div>

    <!-- Search -->
    <form class="search-form">
        <input type="search" id="ytSearch" value="TRiDENT" class="search-input">
        <button id="searchBtn" class="search-btn">検索</button>
    </form>

    <!-- Controls -->
    <nav class="control-wrap">
        <ul class="control-list">

            <li id="doplay" class="mixer-btn">再生</li>
            <li id="dopause" class="mixer-btn">一時停止</li>
            <li id="dostop" class="mixer-btn">停止</li>
            <li id="mute" class="mixer-btn">ミュート</li>
            <li id="do10sNext" class="mixer-btn">10秒先へ</li>
            <li id="do10sPrev" class="mixer-btn">10秒戻る</li>

            <!-- Volume -->
            <label class="volume-box">
                <span>ボリューム</span>
                <input type="range" min="0" max="100" name="volume" id="volume" value="50" class="volume-range">
                <span id="volumeNum" class="volume-num">50</span>
            </label>

            <!-- Movie Select -->
            <li>
                <select id="MovieId" class="movie-select ytMovie" name="ytMovie"></select>
            </li>

            <!-- Speed -->
            <li>
                <form id="doSpeed" class="speed-box">
                    <label><input type="radio" name="speed" value="0.25">0.25</label>
                    <label><input type="radio" name="speed" value="0.5">0.5</label>
                    <label><input type="radio" name="speed" value="1.0" checked>1</label>
                    <label><input type="radio" name="speed" value="1.5">1.5</label>
                    <label><input type="radio" name="speed" value="2">2</label>
                </form>
            </li>

        </ul>
    </nav>

    <script>
        // 2. This code loads the IFrame Player API code asynchronously.
        // 2. 変数tagにscriptタグを作って入れる。Element=要素、Attribute=属性
        var tag = document.createElement('script');

        tag.src = 'https://www.youtube.com/iframe_api';
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // 3. This function creates an <iframe> (and YouTube player)
        //    after the API code downloads.
        // 3. APIコードの読み込み完了後に、この関数で<iframe>（プレーヤー）を生成する。
        let player;

        //①video IDを変数 youtubeIdに代入
        let youtubeId = '7UNzFoubDv0'; //TRiDENT『DISTINATION』
        function onYouTubeIframeAPIReady() {
            //最初のplayerは、変数。後ろのplayerは、<div>のid
            player = new YT.Player('player', {
                height: '360',
                width: '640',
                videoId: youtubeId, //②videoIdをyoutubeIdに変更
                playerVars: {
                    //③パラメータの設定
                    playsinline: 1,
                    controls: 0
                },
                events: {
                    onReady: onPlayerReady
                    //onStateChange: onPlayerStateChange,
                }
            });
        }

        // 4. The API will call this function when the video player is ready.
        // 4. このAPIは、video playerの準備ができたら、この関数を呼び出します。
        function onPlayerReady(event) {
            event.target.stopVideo(); //①最初の再生を止める
            let currentVol = 5; //②最初のボリュームを設定（0〜100）
            event.target.setVolume(currentVol); //③Playerのボリュームに設定
            document.querySelector('#volume').value = currentVol; //④rangeFormに音量を設定
            document.querySelector('#volumeNum').textContent = currentVol; //⑤テキストにも音量を数値で表示
        }

        // 5. The API calls this function when the player's state changes.
        //    The function indicates that when playing a video (state=1),
        //    the player should play for six seconds and then stop.
        /* 5. video playerのステート（状態）が変更されたら、この関数を呼び出す。
        動画を再生するときの設定は、state=1にしておきます。
        プレイヤーは、6000ミリ秒後に終了します。 */
        var done = false;
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING && !done) {
                setTimeout(stopVideo, 6000);
                done = true;
            }
        }
        //停止関数
        function stopVideo() {
            player.stopVideo();
        }

        //停止イベント
        let dostopBtn = document.querySelector('#dostop');
        dostopBtn.addEventListener('click', function () {
            stopVideo();
        });

        //再生関数
        function playTheVideo() {
            player.playVideo();
        }

        //再生イベント
        let doplayBtn = document.querySelector('#doplay');
        doplayBtn.addEventListener('click', function () {
            playTheVideo(); //関数名に変更
        });

        //一時停止関数
        function pauseTheVideo() {
            player.pauseVideo();
        }

        //一時停止イベント
        let dopauseBtn = document.querySelector('#dopause');
        dopauseBtn.addEventListener('click', function () {
            if (player.playVideo()) {
                pauseTheVideo();
            } else {
                pauseTheVideo();
            }
        });

        //ミュート関数
        function onMute() {
            //ミュートの時、trueを返すのでミュートを解除します。
            if (player.isMuted()) {
                player.unMute();
            } else {
                //ミュートが解除されている時はfalseなので、ミュートにします。
                player.mute();
            }
        }

        let onMuteBtn = document.querySelector('#mute');
        onMuteBtn.addEventListener('click', function () {
            onMute();
            if (onMuteBtn.innerText === 'ミュート') {
                onMuteBtn.innerText = 'ミュート解除';
            } else {
                onMuteBtn.innerText = 'ミュート';
            }
        });

        //10秒前にの関数
        function onePrev() {
            let currentTime = player.getCurrentTime();
            player.seekTo(currentTime - 10);
        }

        //10秒後にの関数
        function oneNext() {
            let currentTime = player.getCurrentTime();
            player.seekTo(currentTime + 10);
        }

        //10秒前へイベント
        let onePrevBtn = document.querySelector('#do10sPrev');
        onePrevBtn.addEventListener('click', function () {
            onePrev();
        });

        //10秒後へイベント
        let oneNextBtn = document.querySelector('#do10sNext');
        oneNextBtn.addEventListener('click', function () {
            oneNext();
        });

        //ボリューム関数
        function volumeFn(vol) {
            let currentVol = player.getVolume();
            player.setVolume(vol);
        }

        //ボリュームイベント
        let volumeBtn = document.querySelector('#volume');
        let volumeTxt = document.querySelector('#volumeNum');
        volumeBtn.addEventListener('change', function () {
            volumeFn(this.value);
            volumeTxt.textContent = this.value;
        });

        //動画切り替えイベント
        let movieid = document.querySelector('#MovieId');
        movieid.addEventListener('change', function () {
            youtubeId = movieid.value;
            //プレイヤー削除
            player.destroy();
            onYouTubeIframeAPIReady();
        });

        //再生スピード関数
        function playSpeed(num) {
            //setPlaybackRateが再生スピードをセットするメソッド
            console.log(num);
            player.setPlaybackRate(num);
            player.playVideo();
        }

        //再生スピードイベント
        let speedBtn = document.querySelector('#doSpeed');
        speedBtn.addEventListener('change', function () {
            //数値でないと効かないので、文字列から数値に変換
            playSpeed(parseFloat(speedBtn.speed.value));
        });
    </script>
    <script>
        const USE_LOCAL = true; // 開発中はtrue、本番APIを叩きたいときはfalse

        function ytSearch(val) {
            const key = 'ここにAPIキー'; //自分のキーに書き換えます。
            const num = 10;
            const part = 'snippet';
            const type = 'video';
            const query = val;

            //Youtube API エンドポイント
            const apiUrl = 'https://www.googleapis.com/youtube/v3/search?type=${type}&part=${part}&maxResults=${num}&key=${key}&q=${query}&playsinline=1';

            //ローカルAPIデータ
            const localUrl = './data/sample.json';

            const selectvideo = document.querySelector(".ytMovie");
            fetch(USE_LOCAL ? localUrl : apiUrl)
                .then((data) => data.json())
                .then((obj) => {
                    for (let movie of obj["items"]) {
                        console.log(movie["id"]["videoId"]);
                        console.log(movie["snippet"]["title"]);
                        //各videoIdとタイトルを取得して変数に代入
                        const ytId = movie["id"]["videoId"];
                        const ytTitle = movie["snippet"]["title"];
                        const optionTag = document.createElement('option');
                        optionTag.textContent = ytTitle;
                        optionTag.setAttribute('value', ytId);
                        selectvideo.appendChild(optionTag);
                    }
                });
        }

        const ytSearchBtn = document.querySelector('#searchBtn');
        ytSearchBtn.addEventListener('click', function (e) {
            const ytSearchVal = document.querySelector('#ytSearch').value;
            console.log(ytSearchVal); //検索フォームの値を取得
            e.preventDefault(); //検索ボタンの送信をストップしておく。
            // 関数の実行
            ytSearch(ytSearchVal);
        });
    </script>

</body>

</html>
